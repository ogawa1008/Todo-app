<?xml version="1.0" encoding="UTF-8"?>
<svg width="1254" height="1254" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8AB4FF"/>
      <stop offset="100%" stop-color="#5D9CFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="120" y="120" width="784" height="784" rx="140" fill="url(#bg)"/>

  <!-- Clipboard -->
  <g filter="url(#shadow)">
    <rect x="270" y="250" width="480" height="520" rx="40" fill="white"/>

    <!-- Clipboard top -->
    <rect x="410" y="170" width="200" height="90" rx="30" fill="#243B5A"/>
    <circle cx="510" cy="215" r="18" fill="#78A8FF"/>

    <!-- Checklist -->
    <circle cx="380" cy="400" r="42" fill="#2F80FF"/>
    <path d="M360 400 L378 418 L410 386" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="460" y="386" width="200" height="18" rx="9" fill="#2E4668"/>

    <circle cx="380" cy="530" r="42" fill="#2F80FF"/>
    <path d="M360 530 L378 548 L410 516" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="460" y="516" width="200" height="18" rx="9" fill="#2E4668"/>

    <circle cx="380" cy="660" r="42" stroke="#C5CBD6" stroke-width="10" fill="none"/>
    <rect x="460" y="646" width="140" height="18" rx="9" fill="#D7DCE5"/>
  </g>

  <!-- React logo badge -->
  <g filter="url(#shadow)">
    <circle cx="690" cy="680" r="120" fill="#2F80FF"/>

    <g stroke="white" stroke-width="10" fill="none">
      <ellipse cx="690" cy="680" rx="70" ry="28"/>
      <ellipse cx="690" cy="680" rx="70" ry="28" transform="rotate(60 690 680)"/>
      <ellipse cx="690" cy="680" rx="70" ry="28" transform="rotate(120 690 680)"/>
    </g>

    <circle cx="690" cy="680" r="14" fill="white"/>
  </g>
</svg>
